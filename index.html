<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>D1 Track</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0a0f;--sf:#101018;--sf2:#16161f;--sf3:#1e1e2a;--acc:#e94560;--grn:#2ecc71;--blu:#3b82f6;--org:#f59e0b;--pur:#a855f7;--txt:#eeeef2;--tx2:#88889a;--tx3:#55556a;--red:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt)}
::-webkit-scrollbar{width:0}
button{font-family:inherit;cursor:pointer;border:none;background:none}
button:active{transform:scale(0.96)!important}
input{font-family:inherit}

.app{display:flex;flex-direction:column;height:100dvh}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.pg{display:none;padding:20px 18px 100px}
.pg.active{display:block}

.card{background:var(--sf2);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.04)}
.lbl{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin:24px 0 10px}
.inp{background:var(--sf3);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;color:var(--txt);font-size:16px;width:100%;outline:none}
.btn-main{background:var(--acc);border-radius:14px;padding:16px;color:#fff;font-size:16px;font-weight:700;width:100%;cursor:pointer}

/* Nav */
nav{display:flex;justify-content:space-around;align-items:center;background:var(--sf);border-top:1px solid rgba(255,255,255,0.04);padding:8px 2px calc(8px + env(safe-area-inset-bottom));flex-shrink:0}
nav button{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--tx3);font-size:9px;font-weight:700;padding:4px 6px;position:relative;transition:color 0.15s}
nav button.act{color:var(--acc)}
nav button.act::before{content:'';position:absolute;top:-8px;width:20px;height:3px;background:var(--acc);border-radius:4px}
nav button span.ico{font-size:18px;transition:transform 0.15s}
nav button.act span.ico{transform:scale(1.15)}

/* Timer */
.timer-bar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(16,16,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--acc);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.timer-bar .time{font-size:28px;font-weight:800;font-family:monospace;color:var(--acc)}
.timer-bar button{background:rgba(255,255,255,0.06);border-radius:8px;padding:8px 14px;color:var(--txt);font-size:14px}

/* Section headers */
.sec-hdr{width:100%;padding:10px 14px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-size:13px;font-weight:700;margin-bottom:0;transition:border-radius 0.15s}
.sec-hdr.open{border-radius:12px 12px 0 0}
.sec-body{background:var(--sf2);border-radius:0 0 12px 12px;border:1px solid rgba(255,255,255,0.04);border-top:none;overflow:hidden}
.sec-chev{color:rgba(255,255,255,0.5);font-size:12px;transition:transform 0.2s}

/* Exercise rows */
.ex-row{padding:10px 14px;display:flex;gap:10px;border-bottom:1px solid rgba(255,255,255,0.03);transition:opacity 0.2s}
.ex-row:last-child{border-bottom:none}
.ex-check{width:24px;height:24px;border-radius:7px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;border:2px solid var(--tx3);background:transparent}
.ex-check.done{border:none;background:var(--grn)}
.ex-name{font-size:14px;font-weight:600}
.ex-name.done{text-decoration:line-through}
.ex-tag{font-size:11px;background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:6px;font-family:monospace;font-weight:600;color:var(--tx2)}
.ex-rest{font-size:11px;color:var(--blu);background:rgba(59,130,246,0.1);border-radius:6px;padding:2px 8px;font-weight:600}
.ex-note{font-size:11px;color:var(--tx3);font-style:italic;margin-top:2px}

/* Stretch cards */
.str-card{background:var(--sf2);border-radius:12px;margin-bottom:6px;border:1px solid rgba(255,255,255,0.04);overflow:hidden}
.str-hdr{width:100%;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.str-name{font-size:13px;font-weight:600}
.str-muscle{font-size:10px;color:var(--tx3)}
.str-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.str-body{padding:0 12px 12px;border-top:1px solid rgba(255,255,255,0.03)}
.str-how{font-size:12px;color:var(--tx2);line-height:1.6;margin-top:8px}
.str-hold{font-size:11px;color:var(--txt);font-weight:600;margin-top:6px}

/* Meal */
.meal-hdr{width:100%;background:var(--sf2);border:1px solid rgba(255,255,255,0.04);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.meal-body{background:var(--sf2);border:1px solid rgba(255,255,255,0.04);border-top:1px solid rgba(255,255,255,0.03)}

/* Filters */
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.fbtn{background:var(--sf3);border-radius:20px;padding:6px 11px;color:var(--tx2);font-size:10px;font-weight:700;white-space:nowrap}
.fbtn.act{background:var(--acc);color:#fff}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
</style>
</head>

function toggleStr(id){
const card=document.getElementById(id);let body=card.querySelector(".str-body");
if(body){body.remove();return}
const s=findStr(id);if(!s)return;
body=document.createElement("div");body.className="str-body";
body.innerHTML=`<div class="str-how">${s.hw}</div><div class="str-hold">${s.hd}${s.rl?' · <span style="color:var(--blu)">Roll: '+s.rt+'</span>':''}</div>${s.nt?'<div style="font-size:11px;color:var(--org);margin-top:4px">'+s.nt+'</div>':''}`;
card.appendChild(body);
}

function findStr(id){
const pfx=id.replace(/\d+$/,""),idx=parseInt(id.replace(/\D/g,""));
if(pfx==="ps"){const tags=DAYS[curW].sTags;return STR.filter(s=>tags.includes(s.rg)&&s.pr==="High")[idx]}
if(pfx==="sl"){const list=strFilt==="All"?STR:strFilt==="High"?STR.filter(s=>s.pr==="High"):STR.filter(s=>s.rg===strFilt);return list[idx]}
return null;
}

function submitLog(){
const date=document.getElementById("logDate").value||today(),entry={date};
LIFTS.forEach(l=>{const v=document.getElementById("log_"+l.key).value;if(v)entry[l.key]=parseFloat(v)});
const bw=document.getElementById("log_weight").value;if(bw)entry.weight=parseFloat(bw);
let idx=D.logs.findIndex(l=>l.date===date);
if(idx>=0)D.logs[idx]={...D.logs[idx],...entry};else D.logs.push(entry);
D.logs.sort((a,b)=>a.date.localeCompare(b.date));
LIFTS.forEach(l=>{if(entry[l.key]&&(!D.prs[l.key]||entry[l.key]>D.prs[l.key]))D.prs[l.key]=entry[l.key]});
save();go("home");
}

}

function saveRacePR(k,v){
if(!D.racePrs)D.racePrs={};D.racePrs[k]=v;
if(k==="m100"&&v)D.currentSprint=parseFloat(v);
save();
}

const ct=document.getElementById("content");
NAV.forEach(n=>{const pg=document.createElement("div");pg.className="pg";pg.id="pg-"+n.id;ct.appendChild(pg)});
buildNav();go("home");
}
init();
</script>
